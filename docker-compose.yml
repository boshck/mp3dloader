services:
  bot:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./assets/temp:/app/assets/temp
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: